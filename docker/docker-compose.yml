services:

  db:
    image: postgres:16-alpine
    container_name: gestao_tccs_db
    environment:
      POSTGRES_DB: gestao_tccs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../
      dockerfile: docker/backend/Dockerfile
    container_name: gestao_tccs_backend
    ports:
      - "8000:8000"
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: gestao_tccs
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../back/projeto-gestao-tccs:/app
      - media_files:/app/media

  frontend:
    build:
      context: ../
      dockerfile: docker/frontend/Dockerfile
    container_name: gestao_tccs_frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    volumes:
      - ../front:/app
      - frontend_modules:/app/node_modules

volumes:
  postgres_data:
  media_files:
  frontend_modules:
